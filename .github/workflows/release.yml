name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            os: linux
          - target: aarch64-apple-darwin
            runner: macos-latest
            os: darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Set up Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@v4

      - name: Compile binary
        run: |
          nix develop --command deno compile -A --target ${{ matrix.target }} --output nep-${{ matrix.target }} ./cli/main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nep-${{ matrix.target }}
          path: nep-${{ matrix.target }}
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Assemble release assets and verify both platforms
        run: |
          set -euo pipefail
          mkdir -p release-assets
          LINUX=$(find artifacts -type f -name 'nep-x86_64-unknown-linux-gnu' | head -1)
          MAC=$(find artifacts -type f -name 'nep-aarch64-apple-darwin' | head -1)
          if [ -z "$LINUX" ] || [ ! -f "$LINUX" ]; then
            echo "::error::Missing Linux x86_64 binary (nep-x86_64-unknown-linux-gnu). Both platforms are required."
            exit 1
          fi
          if [ -z "$MAC" ] || [ ! -f "$MAC" ]; then
            echo "::error::Missing macOS ARM64 binary (nep-aarch64-apple-darwin). Both platforms are required."
            exit 1
          fi
          cp "$LINUX" release-assets/nep-x86_64-unknown-linux-gnu
          cp "$MAC" release-assets/nep-aarch64-apple-darwin
          cd release-assets
          sha256sum nep-x86_64-unknown-linux-gnu nep-aarch64-apple-darwin > checksums.txt

      - name: Extract version from tag
        id: tag_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.tag_version.outputs.version }}
          body: |
            ## Changes

            Paste AI-generated release notes here (see [Releasing nep](https://github.com/yasinuslu/nepjua/blob/main/docs/development/releasing-nep.md)). Until then, see commit history for this tag.

            ${{ github.event.head_commit.message }}

            ## Installation

            Supported platforms: **Linux x86_64**, **macOS ARM64 (Apple Silicon)**.

            Download the matching binary from the assets below:

            | Platform | Asset file |
            |----------|------------|
            | Linux x86_64 | `nep-x86_64-unknown-linux-gnu` |
            | macOS ARM64 | `nep-aarch64-apple-darwin` |

            ```bash
            # Verify checksums (from checksums.txt in the same release)
            sha256sum -c checksums.txt

            # Make executable
            chmod +x nep-x86_64-unknown-linux-gnu   # Linux
            # or
            chmod +x nep-aarch64-apple-darwin     # macOS ARM64

            # Optional: install to PATH (example)
            sudo install -m755 nep-x86_64-unknown-linux-gnu /usr/local/bin/nep   # Linux
            sudo install -m755 nep-aarch64-apple-darwin /usr/local/bin/nep       # macOS
            ```

            ## Checksums

            File `checksums.txt` lists SHA256 for both binaries.
          files: |
            release-assets/checksums.txt
            release-assets/nep-x86_64-unknown-linux-gnu
            release-assets/nep-aarch64-apple-darwin
          draft: false
          prerelease: false
